experiment_name: "ccfd_baseline"
seed: 42

dataset:
  name: "ccfd"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  # sample_frac: 0.1  # Uncomment for faster iteration (10% sample)

model:
  type: "neural"
  params:
    epochs: 20
    hidden_dim: 128
    batch_size: 256
    lr: 0.001

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "none"
