experiment_name: "ieee_cis_baseline"
seed: 42

dataset:
  name: "ieee_cis"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.1  # Use 10% sample for faster iteration (full dataset is 590k rows)
  use_identity: false

# Tree model recommended for IEEE-CIS due to:
# - Many categorical features (14 object columns)
# - High missing value rates
# - XGBoost handles these natively without extra preprocessing
model:
  type: "tree"
  params:
    max_depth: 6
    n_estimators: 100
    learning_rate: 0.1

# Note: CAPGD requires gradients, so it will skip for tree models
# Use neural model if you need adversarial attack evaluation
attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "none"
