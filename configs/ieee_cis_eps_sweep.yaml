experiment_name: "ieee_cis_neural_eps_sweep"
seed: 42

dataset:
  name: "ieee_cis"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.1  # Use 10% sample for faster iteration (full dataset is 590k rows)
  use_identity: false

model:
  type: "neural"
  params:
    epochs: 20
    hidden_dim: 128
    batch_size: 256
    lr: 0.001

attack:
  type: "capgd"
  epsilon_values: [0.01, 0.05, 0.1, 0.15, 0.2, 0.3]
  steps: 10

defence:
  type: "none"
