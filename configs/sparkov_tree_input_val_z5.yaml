experiment_name: "sparkov_tree_input_val_z5"
seed: 42

dataset:
  name: "sparkov"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2

model:
  type: "tree"
  params:
    max_depth: 6
    n_estimators: 100
    learning_rate: 0.1

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "input_validation"
  params:
    mode: "sanitise"
    z_threshold: 5.0
