experiment_name: "lcld_neural_baseline"
seed: 42

dataset:
  name: "lcld"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.1  # Use 10% sample for faster iteration (full dataset is 1.3M rows)

model:
  type: "neural"
  params:
    epochs: 20
    hidden_dim: 128
    batch_size: 256
    lr: 0.001

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "none"
