experiment_name: "ccfd_quick_test"
seed: 42

dataset:
  name: "ccfd"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.05  # 5% sample for quick testing

model:
  type: "neural"
  params:
    epochs: 5
    hidden_dim: 64
    batch_size: 128
    lr: 0.001

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 5

defence:
  type: "none"
