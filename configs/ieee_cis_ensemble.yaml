experiment_name: "ieee_cis_ensemble"
seed: 42

dataset:
  name: "ieee_cis"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2

model:
  type: "ensemble"
  params:
    epochs: 15
    hidden_dim: 128
    batch_size: 256
    lr: 0.001

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "ensemble"
