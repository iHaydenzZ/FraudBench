experiment_name: "sparkov_ensemble_square"
seed: 42

dataset:
  name: "sparkov"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.1

model:
  type: "ensemble"
  params:
    epochs: 15
    hidden_dim: 128
    batch_size: 256
    lr: 0.001

attack:
  type: "square"
  epsilon: 0.1
  max_iter: 100
  norm: "inf"

defence:
  type: "ensemble"
