experiment_name: "ieee_cis_tree_input_val"
seed: 42

dataset:
  name: "ieee_cis"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2
  sample_frac: 0.1
  use_identity: false

model:
  type: "tree"
  params:
    max_depth: 6
    n_estimators: 100
    learning_rate: 0.1

# Note: CAPGD requires gradients, so it will skip for tree models
attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "input_validation"
  params:
    mode: "sanitise"
    z_threshold: 3.0
