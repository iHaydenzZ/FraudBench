experiment_name: "ccfd_tree_adv_train"
seed: 42

dataset:
  name: "ccfd"
  split_strategy: "stratified"
  test_size: 0.2
  val_size: 0.2

model:
  type: "tree"
  params:
    max_depth: 6
    n_estimators: 100
    learning_rate: 0.1

attack:
  type: "capgd"
  epsilon: 0.1
  steps: 10

defence:
  type: "adversarial_training"
  params:
    epsilon: 0.1
